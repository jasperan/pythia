services:
  oracle:
    image: gvenzl/oracle-xe:21-slim
    container_name: pythia-oracle
    ports:
      - "1523:1521"
    environment:
      - ORACLE_PASSWORD=Pythia2026Pass
      - ORACLE_DATABASE=FREEPDB1
    volumes:
      - oracle-data:/opt/oracle/oradata
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "sqlplus -s pythia/Pythia2026Pass@localhost:1521/FREEPDB1 <<< 'SELECT 1 FROM DUAL;'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  searxng:
    image: searxng/searxng:latest
    container_name: pythia-searxng
    ports:
      - "8889:8080"
    volumes:
      - ./searxng:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://localhost:8889
    restart: unless-stopped

volumes:
  oracle-data:
