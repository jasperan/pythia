services:
  oracle:
    image: container-registry.oracle.com/database/free:latest-lite
    container_name: pythia-oracle
    ports:
      - "1523:1521"
    environment:
      - ORACLE_PWD=Welcome12345*
    volumes:
      - oracle-data:/opt/oracle/oradata
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "echo 'SELECT 1 FROM DUAL;' | sqlplus -s pythia/pythia@localhost:1521/FREEPDB1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  searxng:
    image: searxng/searxng:latest
    container_name: pythia-searxng
    ports:
      - "8889:8080"
    volumes:
      - ./searxng:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://localhost:8889
    restart: unless-stopped

volumes:
  oracle-data:
